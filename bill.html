<!DOCTYPE html>
<html>
<head>
<title>Bill</title>

<style>

body{
font-family:Arial;
margin:120px 60px;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:40px;
}

.title{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

table,th,td{
border:1px solid black;
}

th,td{
padding:8px;
font-size:14px;
text-align:left;
}

th{
background:#f0f0f0;
}

.total{
font-weight:bold;
}

@media print{
button{
display:none;
}
}

</style>
</head>

<body>

<div class="top">

<div>
REF : <span id="ref"></span>
</div>

<div>
DATE : <span id="date"></span>
</div>

</div>

<p>TO</p>

<p>
<span id="dept"></span>
</p>

<div class="title">
BILL
</div>

<table>

<tr>
<th>SR NO</th>
<th>ITEMS DESCRIPTIONS</th>
<th>SPECIFICATIONS</th>
<th>UNIT OF MEASURE</th>
<th>PACK SIZE</th>
<th>QTY</th>
<th>RATE</th>
<th>AMOUNT</th>
</tr>

<tbody id="items"></tbody>

<tr class="total">
<td colspan="7">TOTAL AMOUNT</td>
<td id="total"></td>
</tr>

<tr class="total">
<td colspan="7">GST 18%</td>
<td id="gst"></td>
</tr>

<tr class="total">
<td colspan="7">GRAND TOTAL</td>
<td id="grand"></td>
</tr>

</table>

<br><br>

<button onclick="window.print()">Print</button>

<script>

let po=JSON.parse(localStorage.getItem("selectedPO")||"{}")

document.getElementById("ref").innerText=po.number || ""

document.getElementById("date").innerText=new Date().toLocaleDateString()

document.getElementById("dept").innerText=po.department || ""

let items=document.getElementById("items")

let total=po.amount || 0

items.innerHTML+=`
<tr>
<td>1</td>
<td>Item from PO</td>
<td>As per specification</td>
<td>EACH</td>
<td>1</td>
<td>1</td>
<td>${total}</td>
<td>${total}</td>
</tr>
`

let gst=total*0.18

let grand=total+gst

document.getElementById("total").innerText=total.toFixed(2)

document.getElementById("gst").innerText=gst.toFixed(2)

document.getElementById("grand").innerText=grand.toFixed(2)

</script>

</body>
</html>
