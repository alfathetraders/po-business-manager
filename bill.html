<!DOCTYPE html><html>
<head><title>Bill</title><style>

body{
font-family:Arial;
margin:120px 60px;
}

.top{
display:flex;
justify-content:space-between;
margin-bottom:40px;
}

.title{
text-align:center;
font-size:28px;
font-weight:bold;
margin-bottom:20px;
}

table{
width:100%;
border-collapse:collapse;
}

table,th,td{
border:1px solid black;
}

th,td{
padding:8px;
}

.total{
font-weight:bold;
}

@media print{
button{
display:none;
}
}

</style></head><body><div class="top"><div>
REF: <span id="ref"></span>
</div><div>
DATE: <span id="date"></span>
</div></div><p>TO</p><p id="dept"></p><div class="title">
BILL
</div><table><tr><th>SR NO</th>
<th>ITEM</th>
<th>SPEC</th>
<th>UNIT</th>
<th>PACK</th>
<th>QTY</th>
<th>RATE</th>
<th>AMOUNT</th></tr><tbody id="items"></tbody><tr class="total"><td colspan="7">TOTAL AMOUNT</td>
<td id="total"></td></tr><tr class="total"><td colspan="7">GST 18%</td>
<td id="gst"></td></tr><tr class="total"><td colspan="7">GRAND TOTAL</td>
<td id="grand"></td></tr></table><br><br>

<button onclick="window.print()">Print</button>

<script>

let po=JSON.parse(localStorage.getItem("selectedPO")||"{}")

document.getElementById("ref").innerText=po.number

document.getElementById("date").innerText=new Date().toLocaleDateString()

document.getElementById("dept").innerText=po.department

let table=document.getElementById("items")

let total=0

po.items.forEach((it,i)=>{

let amount=it.qty*it.rate

total+=amount

table.innerHTML+=`

<tr>

<td>${i+1}</td>
<td>${it.name}</td>
<td>${it.spec}</td>
<td>${it.unit}</td>
<td>${it.pack}</td>
<td>${it.qty}</td>
<td>${it.rate}</td>
<td>${amount}</td>

</tr>

`

})

let base=total/1.18

let gst=total-base

document.getElementById("total").innerText=base.toFixed(2)
document.getElementById("gst").innerText=gst.toFixed(2)
document.getElementById("grand").innerText=total.toFixed(2)

</script></body>
</html>
