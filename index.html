<!DOCTYPE html>
<html>

<head>
<title>PO Business Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">

<h2>PO Manager</h2>

<ul>

<li onclick="showPage('dashboard')">Dashboard</li>

<li onclick="showPage('addpo')">Add PO</li>

<li onclick="showPage('records')">Records</li>

</ul>

</div>


<div class="content">

<h1>PO Business Manager</h1>


<!-- DASHBOARD -->

<div id="dashboard" class="page">

<h2>Dashboard</h2>

<p>Total POs: <span id="totalPO">0</span></p>

<p>Total Profit: <span id="totalProfit">0</span></p>

</div>



<!-- ADD PO -->

<div id="addpo" class="page hidden">

<h2>Add PO</h2>

<input id="poNumber" placeholder="PO Number"><br><br>

<input id="client" placeholder="Client"><br><br>

<input id="department" placeholder="Department"><br><br>

<input id="amount" placeholder="PO Amount"><br><br>

<input id="investment" placeholder="Investment"><br><br>

<input id="extra" placeholder="Extra Expense"><br><br>


<button onclick="calculate()">Calculate</button>

<p id="result"></p>



<h3>Items</h3>

<table>

<tr>
<th>Item</th>
<th>Specification</th>
<th>Unit</th>
<th>Pack</th>
<th>Qty</th>
<th>Rate</th>
<th></th>
</tr>

<tbody id="itemsTable"></tbody>

</table>


<input id="itemName" placeholder="Item">
<input id="itemSpec" placeholder="Specification">
<input id="itemUnit" placeholder="Unit">
<input id="itemPack" placeholder="Pack">
<input id="itemQty" placeholder="Qty">
<input id="itemRate" placeholder="Rate">

<button onclick="addItem()">Add Item</button>

<br><br>

<button onclick="savePO()">Save PO</button>

</div>



<!-- RECORDS -->

<div id="records" class="page hidden">

<h2>PO Records</h2>

<table>

<tr>

<th>PO</th>
<th>Client</th>
<th>PO Amount</th>
<th>Check Amount</th>
<th>Investment</th>
<th>Extra</th>
<th>Profit</th>

</tr>

<tbody id="tableBody"></tbody>

</table>

</div>


</div>

<script src="app.js"></script>

</body>
</html>
