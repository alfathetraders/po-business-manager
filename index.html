<!DOCTYPE html>
<html>

<head>

<title>PO Business Manager</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<div class="sidebar">

<h2>PO Manager</h2>

<ul>

<li onclick="showPage('dashboard')">Dashboard</li>

<li onclick="showPage('addpo')">Add PO</li>

<li onclick="showPage('records')">Records</li>

</ul>

</div>


<div class="content">

<h1>PO Business Manager</h1>



<!-- DASHBOARD -->

<div id="dashboard" class="page">

<div class="cards">

<div class="card">

<h3>Total PO</h3>

<p id="totalPO">0</p>

</div>


<div class="card">

<h3>Total Profit</h3>

<p id="totalProfit">0</p>

</div>


<div class="card">

<h3>System</h3>

<p>Active</p>

</div>

</div>

</div>




<!-- ADD PO -->

<div id="addpo" class="page hidden">

<h2>Add PO</h2>

<input id="poNumber" placeholder="PO Number"><br><br>

<input id="client" placeholder="Client"><br><br>

<input id="department" placeholder="Department"><br><br>

<input id="amount" placeholder="PO Amount"><br><br>

<input id="investment" placeholder="Investment"><br><br>

<input id="extra" placeholder="Extra Expense"><br><br>


<button onclick="calculate()">Calculate</button>

<p id="result"></p>

<button onclick="savePO()">Save PO</button>

</div>




<!-- RECORDS -->

<div id="records" class="page hidden">

<h2>PO Records</h2>

<table>

<tr>

<th>PO</th>
<th>Client</th>
<th>PO Amount</th>
<th>Check Amount</th>
<th>Investment</th>
<th>Extra</th>
<th>Profit</th>

</tr>

<tbody id="tableBody"></tbody>

</table>

</div>


</div>


<script src="app.js"></script>

</body>

</html>
