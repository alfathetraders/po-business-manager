<!DOCTYPE html>
<html>

<head>

<title>PO Business Manager</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

<h2>PO Manager</h2>

<ul>

<li onclick="showPage('dashboard')">Dashboard</li>
<li onclick="showPage('addpo')">Add PO</li>
<li onclick="showPage('records')">Records</li>

</ul>

</div>


<div class="content">

<div class="header">

<h1>Alfathe Traders</h1>

<p>Purchase Order Management System</p>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="page">
<canvas id="profitChart" style="max-width:600px;margin-top:30px;"></canvas>
  
<div class="cards">

<div class="card">

<h3>Total PO</h3>
<p id="totalPO">0</p>

</div>


<div class="card">

<h3>Total Profit</h3>
<p id="totalProfit">0</p>

</div>


<div class="card">

<h3>System</h3>
<p>Active</p>

</div>

</div>

</div>



<!-- ADD PO -->

<div id="addpo" class="page hidden">

<h2>Add PO</h2>

<input id="poNumber" placeholder="PO Number"><br><br>

<input id="client" placeholder="Client"><br><br>

<input id="department" placeholder="Department"><br><br>

<input id="amount" placeholder="PO Amount"><br><br>

<input id="investment" placeholder="Investment"><br><br>

<input id="extra" placeholder="Extra Expense"><br><br>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>

<label>Upload PO Image</label><br>
<input type="file" id="poImage" accept="image/*,application/pdf">

<button onclick="readPOImage()">Read PO Image</button><br><br>

<button onclick="savePO()">Save PO</button>

</div>



<!-- RECORDS -->

<div id="records" class="page hidden">

<h2>PO Records</h2>
<input type="text" id="searchPO" placeholder="Search PO or Client..." onkeyup="searchPO()" style="padding:8px;width:250px;margin-bottom:10px;">

<table>

<tr>

<th>PO</th>
<th>Client</th>
<th>PO Amount</th>
<th>Check Amount</th>
<th>Investment</th>
<th>Extra</th>
<th>Profit</th>
<th>Action</th>
<th>ROI %</th>

</tr>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>


<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
</body>
