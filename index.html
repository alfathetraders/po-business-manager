<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PO Business Manager Enterprise</title>

<style>

body{
font-family:Arial;
margin:0;
display:flex;
}

.sidebar{
width:220px;
background:#2c3e50;
color:white;
height:100vh;
padding:20px;
}

.sidebar h2{
margin-top:0;
}

.sidebar ul{
list-style:none;
padding:0;
}

.sidebar li{
padding:10px;
cursor:pointer;
}

.sidebar li:hover{
background:#34495e;
}

.content{
flex:1;
padding:20px;
}

.hidden{
display:none;
}

input{
margin:5px;
padding:5px;
}

button{
padding:6px 10px;
margin:5px;
}

table{
border-collapse:collapse;
width:100%;
margin-top:20px;
}

table,th,td{
border:1px solid #ccc;
}

th,td{
padding:8px;
}

</style>
</head>

<body>

<div class="sidebar">

<h2>PO Manager</h2>

<ul>

<li onclick="showPage('dashboard')">Dashboard</li>
<li onclick="showPage('addpo')">Add PO</li>
<li onclick="showPage('records')">Records</li>

</ul>

</div>

<div class="content">

<h1>PO Business Manager Enterprise</h1>

<!-- Dashboard -->

<div id="dashboard" class="page">

<h2>Dashboard</h2>

<p>Total POs: <span id="totalPO">0</span></p>

</div>

<!-- Add PO -->

<div id="addpo" class="page hidden">

<h2>Add PO</h2>

<input id="poNumber" placeholder="PO Number"><br>
<input id="client" placeholder="Client Name"><br>
<input id="department" placeholder="Department"><br>
<input id="amount" placeholder="PO Amount"><br>
<input id="investment" placeholder="Investment"><br>

<button onclick="calculate()">Calculate Profit</button>

<p id="result"></p>

<h3>Items</h3>

<table>

<tr>
<th>Item</th>
<th>Spec</th>
<th>Unit</th>
<th>Pack</th>
<th>Qty</th>
<th>Rate</th>
<th></th>
</tr>

<tbody id="itemsTable"></tbody>

</table>

<br>

<input id="itemName" placeholder="Item">
<input id="itemSpec" placeholder="Specification">
<input id="itemUnit" placeholder="Unit">
<input id="itemPack" placeholder="Pack">
<input id="itemQty" placeholder="Qty">
<input id="itemRate" placeholder="Rate">

<button onclick="addItem()">Add Item</button>

<br><br>

<button onclick="savePO()">Save PO</button>

</div>

<!-- Records -->

<div id="records" class="page hidden">

<h2>PO Records</h2>

<table>

<thead>

<tr>

<th>PO</th>
<th>Client</th>
<th>Amount</th>
<th>Investment</th>
<th>Profit</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
