<!DOCTYPE html>
<html>

<head>

<title>PO Business Manager</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

<h2>PO Manager</h2>

<ul>

<li onclick="showPage('dashboard')">Dashboard</li>
<li onclick="showPage('addpo')">Add PO</li>
<li onclick="showPage('records')">Records</li>
<li onclick="showPage('reports')">Reports</li>

<li><a href="clients.html">Clients</a></li>
<li><a href="expenses.html">Expenses</a></li>

</ul>

</div>

<div class="content">

<h1>PO Business Manager</h1>

<!-- Dashboard -->

<div id="dashboard" class="page">

<h2>Dashboard</h2>

<p>Total POs: <span id="totalPO">0</span></p>

<p>Total Profit: <span id="totalProfit">0</span></p>

<canvas id="profitChart"></canvas>

</div>

<!-- Add PO -->

<div id="addpo" class="page hidden">

<h2>Add PO</h2>

<input id="poNumber" placeholder="PO Number"><br>

<input id="client" placeholder="Client Name"><br>

<input id="department" placeholder="Department"><br>

<input id="amount" placeholder="PO Amount"><br>

<input id="investment" placeholder="Investment"><br>

<button onclick="calculate()">Calculate</button>

<p id="result"></p>

<h3>Items</h3>

<table>

<tr>
<th>Item</th>
<th>Spec</th>
<th>Unit</th>
<th>Pack</th>
<th>Qty</th>
<th>Rate</th>
<th></th>
</tr>

<tbody id="itemsTable"></tbody>

</table>

<input id="itemName" placeholder="Item">
<input id="itemSpec" placeholder="Specification">
<input id="itemUnit" placeholder="Unit">
<input id="itemPack" placeholder="Pack">
<input id="itemQty" placeholder="Qty">
<input id="itemRate" placeholder="Rate">

<button onclick="addItem()">Add Item</button>

<br><br>

<button onclick="savePO()">Save PO</button>

</div>

<!-- Records -->

<div id="records" class="page hidden">

<h2>PO Records</h2>

<table>

<tr>

<th>PO</th>
<th>Client</th>
<th>PO Amount</th>
<th>Check Amount</th>
<th>Investment</th>
<th>Profit</th>
<th>Actions</th>

</tr>

<tbody id="tableBody"></tbody>

</table>

</div>

<!-- Reports -->

<div id="reports" class="page hidden">

<h2>Reports</h2>

<canvas id="reportChart"></canvas>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
